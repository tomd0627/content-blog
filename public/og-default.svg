<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4622d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7a3818;stop-opacity:1" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="900" cy="150" r="300" fill="rgba(255,255,255,0.04)" filter="url(#blur)"/>
  <circle cx="200" cy="500" r="200" fill="rgba(255,255,255,0.03)" filter="url(#blur)"/>

  <!-- Grain texture simulation via small dots -->
  <rect x="0" y="0" width="1200" height="630" fill="url(#bg)" opacity="0.05"/>

  <!-- Icon -->
  <text x="100" y="280" font-family="Georgia, serif" font-size="120" fill="rgba(255,255,255,0.15)">✎</text>

  <!-- Site name -->
  <text x="100" y="430" font-family="Georgia, serif" font-size="22" fill="rgba(255,255,255,0.5)" letter-spacing="4">FIELD NOTES</text>

  <!-- Title -->
  <text x="100" y="500" font-family="Georgia, serif" font-size="64" font-weight="bold" fill="white">Field Notes</text>

  <!-- Subtitle -->
  <text x="100" y="555" font-family="Georgia, serif" font-size="32" fill="rgba(255,255,255,0.7)">A Developer Blog</text>

  <!-- Bottom rule -->
  <line x1="100" y1="590" x2="400" y2="590" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
</svg>